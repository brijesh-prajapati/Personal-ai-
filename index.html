<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prajapati AI - Personal Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">PRAJAPATI AI</div>
            <nav class="nav-links">
                <button class="nav-btn active" onclick="switchTab('chat')">💬 Chat</button>
                <button class="nav-btn" onclick="switchTab('gallery')">🖼️ Gallery</button>
                <button class="nav-btn" onclick="switchTab('history')">📜 History</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="chat-section" class="tab-content active">
                <header class="chat-header">
                    <div class="avatar-container">
                        <div class="avatar" id="prajapati-avatar">✨</div>
                        <div class="avatar-status">Prajapati AI: <span id="avatar-mood">Neutral</span></div>
                    </div>
                </header>

                <div class="chat-messages" id="chat-messages">
                    <div class="message ai-message">Hello! I am Prajapati AI, your personal full-stack application architect. How can I assist you today?</div>
                </div>

                <div class="utility-bar">
                    <button class="util-btn" onclick="insertPrompt('image')">🎨 Image Mode</button>
                    <select id="style-preset" class="style-dropdown">
                        <option value="none">Choose Style Preset</option>
                        <option value="3D Realistic">3D Realistic</option>
                        <option value="3D Anime">3D Anime</option>
                        <option value="Watercolor">Watercolor</option>
                        <option value="Oil Painting">Oil Painting</option>
                        <option value="Digital Art">Digital Art</option>
                        <option value="Pixel Art">Pixel Art</option>
                        <option value="Comic Book">Comic Book</option>
                        <option value="Minimalist">Minimalist</option>
                    </select>
                </div>

                <div class="input-container">
                    <button class="mic-btn" id="mic-btn" onclick="toggleVoiceInput()">🎙️</button>
                    <input type="text" id="user-input" placeholder="Ask Prajapati AI to write code, design databases or generate UI..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">Send</button>
                </div>
            </section>

            <section id="gallery-section" class="tab-content">
                <h2>Generated Images Assets Gallery</h2>
                <div class="gallery-grid" id="gallery-grid"></div>
            </section>

            <section id="history-section" class="tab-content">
                <h2>Conversation History Log</h2>
                <div class="history-list" id="history-list"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
